<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa electoral Catalunya 2024</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="left-sidebar">
      <div class="sidebar-header">
        <div class="eyebrow">Eleccions al Parlament</div>
        <h1>Catalunya 2024 TEST</h1>
        <p class="subtitle">Resultats municipals interactius</p>
      </div>

      <section class="card search-card">
        <label for="search-input" class="card-title">Cercador</label>
        <input id="search-input" type="text" placeholder="Cerca municipi..." />
        <div id="search-results" class="search-results hidden"></div>
      </section>

      <section class="card">
        <div class="card-title">Indicador</div>
        <div id="mode-buttons"></div>
      </section>

      <section class="card legend-card">
        <div class="card-title">Escala</div>
        <div id="legend-title"></div>
        <div id="legend-scale"></div>
        <div id="legend-labels"></div>
        <span id="legend-min"></span>
        <span id="legend-max"></span>
      </section>

      <section>
        <div id="summary-main-label"></div>
        <div id="summary-main-value"></div>
        <div id="summary-main-delta"></div>

        <div id="summary-participacio-value"></div>
        <div id="summary-participacio-delta"></div>

        <div id="summary-municipis-value"></div>
        <div id="summary-municipis-share"></div>

        <div id="summary-lider-value"></div>
        <div id="summary-lider-sub"></div>
        <div id="summary-lider-pct"></div>
      </section>
    </aside>

    <main class="map-stage">
      <div id="map"></div>
      <div id="hover-card" class="hidden"></div>

      <div id="right-panel" class="collapsed">
        <button id="panel-toggle">❮</button>
        <div id="party-cards"></div>
      </div>
    </main>
  </div>

  <template id="party-card-template">
    <div class="party-card">
      <div class="party-name"></div>
      <div class="metric-wins"></div>
      <div class="metric-wins-delta"></div>
      <div class="metric-votes"></div>
      <div class="metric-votes-delta"></div>
      <div class="metric-pct"></div>
      <div class="metric-pct-delta"></div>
    </div>
  </template>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
